// ── Storage helpers (localStorage for scores) ────────────────────────────────
const STORAGE_KEY = 'mm_week1_scores';

function getScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveScore(nickname, score, attempts) {
  const scores = getScores();
  const existing = scores.findIndex(s => s.nickname.toLowerCase() === nickname.toLowerCase());
  if (existing >= 0) {
    scores[existing].score = Math.max(scores[existing].score, score);
    scores[existing].attempts = (scores[existing].attempts || 1) + 1;
  } else {
    scores.push({ nickname, score, attempts: attempts || 1, date: new Date().toLocaleDateString() });
  }
  scores.sort((a,b) => b.score - a.score);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
}

// ── Quiz State ────────────────────────────────────────────────────────────────
let quizState = {
  current: 0,
  answers: {},
  submitted: {},
  score: 0,
  complete: false,
  attempts: parseInt(localStorage.getItem('mm_week1_attempts') || '0'),
};

function renderQuiz() {
  const q = quizQuestions[quizState.current];
  const isAnswered = quizState.submitted[quizState.current] !== undefined;
  const chosen = quizState.answers[quizState.current];
  const total = quizQuestions.length;
  const qNum = quizState.current + 1;

  return `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <span class="pill pill-orange">Question ${qNum} of ${total}</span>
        <span style="font-size:13px;color:var(--muted);">Score: <strong style="color:#fff;">${quizState.score}</strong> / ${Object.keys(quizState.submitted).length}</span>
      </div>

      <div style="background:#0f0f11;border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:24px;">
        <h3 style="font-size:1.1rem;line-height:1.6;color:#fff;font-weight:600;">${q.q}</h3>
      </div>

      <div id="quiz-options">
        ${q.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (isAnswered) {
            if (i === q.correct) cls += ' correct';
            else if (i === chosen && i !== q.correct) cls += ' wrong';
          } else if (i === chosen) cls += ' selected';
          return `<button class="${cls}" onclick="selectAnswer(${i})" ${isAnswered ? 'disabled' : ''}>
            <div class="option-dot"></div>
            <span>${opt}</span>
          </button>`;
        }).join('')}
      </div>

      ${isAnswered ? `
        <div style="margin-top:20px;padding:16px 20px;background:${chosen === q.correct ? '#0a1f0a' : '#1f0a0a'};border:1px solid ${chosen === q.correct ? '#166534' : '#7f1d1d'};border-radius:12px;">
          <p style="font-size:14px;color:${chosen === q.correct ? '#4ade80' : '#fca5a5'};line-height:1.6;">
            <strong>${chosen === q.correct ? '✓ Correct!' : '✗ Not quite.'}</strong> ${q.explanation}
          </p>
        </div>
        <div style="display:flex;justify-content:${quizState.current < total - 1 ? 'flex-end' : 'space-between'};margin-top:16px;gap:12px;flex-wrap:wrap;">
          ${quizState.current === total - 1 ? `<button class="btn-secondary" onclick="restartQuiz()">🔄 Retake Quiz</button>` : ''}
          ${quizState.current < total - 1 
            ? `<button class="btn-primary" onclick="nextQuestion()">Next Question →</button>`
            : `<button class="btn-primary" onclick="finishQuiz()">See Final Score 🎉</button>`
          }
        </div>
      ` : `
        <div style="display:flex;justify-content:flex-end;margin-top:16px;">
          <button class="btn-primary" onclick="submitAnswer()" ${chosen === undefined ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>Submit Answer</button>
        </div>
      `}
    </div>
  `;
}

function renderQuizComplete() {
  const pct = Math.round((quizState.score / quizQuestions.length) * 100);
  const grade = pct >= 85 ? ['🏆', 'Excellent!', '#4ade80'] : pct >= 70 ? ['🎯', 'Good Work!', 'var(--orange)'] : ['📚', 'Keep Studying', '#f87171'];
  return `
    <div style="text-align:center;padding:40px 20px;">
      <div style="font-size:4rem;margin-bottom:16px;">${grade[0]}</div>
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:${grade[2]};">${grade[1]}</h2>
      <div style="font-size:5rem;font-weight:900;color:#fff;margin:16px 0;">${pct}<span style="font-size:2rem;color:var(--muted);">%</span></div>
      <p style="color:var(--muted);margin-bottom:8px;">You answered ${quizState.score} of ${quizQuestions.length} correctly</p>
      <p style="color:#a1a1aa;font-size:13px;margin-bottom:32px;">Attempt #${quizState.attempts}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-secondary" onclick="restartQuiz()">🔄 Retake Quiz</button>
        <button class="btn-primary" onclick="shareScore(${quizState.score}, ${quizQuestions.length})">📊 Share My Score</button>
      </div>
    </div>
  `;
}

function selectAnswer(i) {
  if (quizState.submitted[quizState.current] !== undefined) return;
  quizState.answers[quizState.current] = i;
  document.getElementById('content').querySelector('#quiz-options, .quiz-option')?.closest('div');
  updateQuizDisplay();
}

function updateQuizDisplay() {
  const quizDiv = document.getElementById('quiz-container');
  if (quizDiv) quizDiv.innerHTML = renderQuiz();
}

function submitAnswer() {
  const chosen = quizState.answers[quizState.current];
  if (chosen === undefined) return;
  quizState.submitted[quizState.current] = chosen;
  if (chosen === quizQuestions[quizState.current].correct) quizState.score++;
  updateQuizDisplay();
}

function nextQuestion() {
  if (quizState.current < quizQuestions.length - 1) {
    quizState.current++;
    updateQuizDisplay();
  }
}

function finishQuiz() {
  quizState.complete = true;
  quizState.attempts++;
  unlockedAll = true;
  localStorage.setItem('mm_week1_attempts', quizState.attempts);
  localStorage.setItem('mm_week1_unlocked', 'true');
  const quizDiv = document.getElementById('quiz-container');
  if (quizDiv) quizDiv.innerHTML = renderQuizComplete();
  renderToc();
  const nav = document.getElementById('footer-nav');

let current = 0;

let unlockedAll = localStorage.getItem('mm_week1_unlocked') === 'true';

function renderToc() {
  ['desktop-toc', 'mobile-toc'].forEach(id => {
    const el = document.getElementById(id);
    const isMobile = id === 'mobile-toc';
    el.innerHTML = '';
    slides.forEach((slide, i) => {
      const isActive = current === i;
      const isDone = completed.has(i);
      const isLocked = !unlockedAll && i > 0 && !completed.has(i-1) && i !== current;
      if (isMobile) {
        const btn = document.createElement('button');
        btn.style.cssText = `flex-shrink:0;padding:8px 14px;border-radius:999px;border:1px solid ${isActive?'var(--orange)':isDone?'#166534':completed.has(i-1)||i===0?'var(--border)':'var(--border)'};background:${isActive?'var(--orange)':isDone?'#0a1f0a':'transparent'};color:${isActive?'#000':isDone?'#4ade80':'var(--muted)'};font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:${isLocked?'not-allowed':'pointer'};white-space:nowrap;opacity:${isLocked?0.4:1};`;
        btn.textContent = slide.title;
        btn.onclick = () => { if (!isLocked) { current = i; render(); } };
        el.appendChild(btn);
      } else {
        const btn = document.createElement('button');
        btn.className = `toc-btn${isActive?' active':isDone?' done':''}`;
        if (isLocked) btn.disabled = true;
        btn.innerHTML = `<div class="toc-num">${isDone?'✓':i+1}</div><span style="flex:1;font-size:13px;">${slide.title}</span>`;
        btn.onclick = () => { if (!isLocked) { current = i; render(); } };
        el.appendChild(btn);
      }
    });
  });
}

function render() {
  renderToc();
  const progress = ((current + 1) / slides.length) * 100;

  }

content.innerHTML = innerHtml;

const isLastSlide = current === slides.length - 1;

}

function toggleNotes() {
  const panel = document.getElementById('notes-panel');

// ── Sequence of Return Risk ───────────────────────────────────────────────────
const srrReturns = {
  a: [-0.25, -0.22, -0.28, 0.12, 0.15, 0.18, 0.14, 0.12, 0.16, 0.15, 0.18, 0.14, 0.16, 0.18, 0.15, 0.14, 0.12, 0.16, 0.18, 0.15],
  b: [ 0.15, 0.18, 0.16, 0.12, 0.14, 0.15, 0.18, 0.16, 0.14, 0.18, 0.15, 0.16, 0.12, 0.14, 0.18, 0.15, 0.12, -0.28, -0.22, -0.25],
};
const srrStart = 500000;
const srrWithdraw = 30000;

function srrCalcBalances(returns) {
  let bal = srrStart;
  const balances = [bal];
  returns.forEach(r => {
    bal = bal * (1 + r) - srrWithdraw;
    balances.push(Math.max(0, bal));
  });
  return balances;
}

function srrFmt(n) {
  if (n === 0) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  return '$' + Math.round(n/1000) + 'k';
}

function srrBuildChart(chartId, balances, color, max) {
  const chart = document.getElementById(chartId);
  if (!chart) return;
  chart.innerHTML = '';
  balances.forEach((b, i) => {
    if (i === 0) return;
    const bar = document.createElement('div');
    const pct = b / max;
    bar.style.cssText = 'flex:1;min-width:0;height:0px;opacity:0.15;border-radius:3px 3px 0 0;transition:height 0.2s;';
    bar.style.background = b === 0 ? '#3f3f46' : pct > 0.5 ? color : pct > 0.2 ? '#f97316' : '#ef4444';
    bar.id = chartId + '-bar-' + i;
    bar.addEventListener('mouseenter', function() {
      let tip = document.getElementById('srr-tooltip');
      if (!tip) {
        tip = document.createElement('div');
        tip.id = 'srr-tooltip';
        tip.style.cssText = 'position:fixed;background:#1c1c1f;border:1px solid #f97316;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;color:#fff;pointer-events:none;z-index:999;';
        document.body.appendChild(tip);
      }
      tip.textContent = 'Year ' + i + ': ' + srrFmt(b);
      tip.style.display = 'block';
    });
    bar.addEventListener('mousemove', function(e) {
      const tip = document.getElementById('srr-tooltip');
      if (tip) { tip.style.left = (e.clientX + 12) + 'px'; tip.style.top = (e.clientY - 36) + 'px'; }
    });
    bar.addEventListener('mouseleave', function() {
      const tip = document.getElementById('srr-tooltip');
      if (tip) tip.style.display = 'none';
    });
    chart.appendChild(bar);
  });
}

function srrAnimate() {
  const balA = srrCalcBalances(srrReturns.a);
  const balB = srrCalcBalances(srrReturns.b);
  const srrMax = Math.max(...balA, ...balB);
  srrBuildChart('srr-chart-a', balA, '#4ade80', srrMax);
  srrBuildChart('srr-chart-b', balB, '#4ade80', srrMax);
  const yearLabel = document.getElementById('srr-year-label');
  let i = 1;
  function step() {
    if (i >= balA.length) {
      if (yearLabel) yearLabel.textContent = 'Portfolio A depleted at Year ' + (balA.findIndex(b => b === 0)) + ' — Portfolio B survives';
      return;
    }
    const barA = document.getElementById('srr-chart-a-bar-' + i);
    const barB = document.getElementById('srr-chart-b-bar-' + i);
    if (barA) { barA.style.height = (balA[i] === 0 ? 4 : Math.max(4, Math.round((balA[i]/srrMax)*110))) + 'px'; barA.style.opacity = '1'; }
    if (barB) { barB.style.height = (balB[i] === 0 ? 4 : Math.max(4, Math.round((balB[i]/srrMax)*110))) + 'px'; barB.style.opacity = '1'; }
    if (yearLabel) yearLabel.textContent = 'Year ' + i + '  |  A: ' + srrFmt(balA[i]) + '  —  B: ' + srrFmt(balB[i]);
    i++;
    setTimeout(step, 300);
  }
  step();
}

function srrToggleTable() {
  const table = document.getElementById('srr-table');
  const btn = document.getElementById('srr-table-btn');
  if (!table || !btn) return;

  if (table.style.display === 'none') {
    const balA = srrCalcBalances(srrReturns.a);
    const balB = srrCalcBalances(srrReturns.b);
    const tbody = document.getElementById('srr-table-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    for (let i = 1; i <= 20; i++) {
      const retA = srrReturns.a[i-1];
      const retB = srrReturns.b[i-1];

function wdsFormat(val) {
  const n = parseInt(val.replace(/[^0-9]/g, '')) || 0;
  return n.toLocaleString();
}

function wdsUpdate() {
  const ids = ['income', 'realestate', 'growth', 'cash'];
  const targets = { income: 30, realestate: 30, growth: 30, cash: 10 };
  const colors = { income: '#22d3ee', realestate: '#f97316', growth: '#f87171', cash: '#facc15' };
  const labels = { income: 'Income', realestate: 'Real Estate', growth: 'Growth', cash: 'Cash' };

  // Format inputs
  ids.forEach(id => {
    const input = document.getElementById('bucket-' + id);
    if (!input) return;
    const raw = input.value.replace(/[^0-9]/g, '');
    const cursor = input.selectionStart;
    input.value = raw ? parseInt(raw).toLocaleString() : '';
    try { input.setSelectionRange(cursor, cursor); } catch(e) {}
  });

  // Calculate totals
  const values = {};
  let total = 0;
  ids.forEach(id => {
    const input = document.getElementById('bucket-' + id);
    const val = input ? parseInt(input.value.replace(/[^0-9]/g, '')) || 0 : 0;
    values[id] = val;
    total += val;
  });

  // Update total
  const totalEl = document.getElementById('wds-total');
  if (totalEl) totalEl.textContent = 'Total Portfolio: $' + total.toLocaleString();

  if (total === 0) return;

  // Update bars and percentages
  const issues = [];
  ids.forEach(id => {
    const pct = Math.round((values[id] / total) * 100);
    const target = targets[id];
    const bar = document.getElementById('wds-bar-' + id);
    const pctEl = document.getElementById('wds-pct-' + id);
    if (bar) bar.style.width = Math.min(pct, 100) + '%';
    if (pctEl) pctEl.textContent = pct + '%';

    const diff = pct - target;
    if (values[id] === 0) {
      issues.push({ id, label: labels[id], type: 'missing', pct, target, diff });
    } else if (diff > 10) {
      issues.push({ id, label: labels[id], type: 'heavy', pct, target, diff });
    } else if (diff < -10) {
      issues.push({ id, label: labels[id], type: 'light', pct, target, diff });
    }
  });

  // Build verdict
  const verdict = document.getElementById('wds-verdict');
  if (!verdict) return;

  if (issues.length === 0) {
    verdict.style.background = '#0a1f0a';
    verdict.style.border = '1px solid #166534';
    verdict.innerHTML = '<p style="color:#4ade80;font-size:14px;line-height:1.7;">✓ <strong>Well balanced.</strong> Your current allocation is close to the 10/30/30/30 target across all four buckets.</p>';
    return;
  }

  const missing = issues.filter(i => i.type === 'missing').map(i => i.label);
  const heavy = issues.filter(i => i.type === 'heavy').map(i => i.label + ' (' + i.pct + '%)');
  const light = issues.filter(i => i.type === 'light').map(i => i.label + ' (' + i.pct + '%)');

  let text = '';
  if (missing.length) text += 'Your portfolio has <strong style="color:#f87171;">no ' + missing.join(' or ') + ' bucket</strong>. ';
  if (heavy.length) text += 'You are <strong style="color:#f97316;">heavy in ' + heavy.join(' and ') + '</strong> relative to the target. ';
  if (light.length) text += 'You are <strong style="color:#facc15;">light in ' + light.join(' and ') + '</strong> relative to the target. ';
  text += '<br><br><span style="color:#71717a;font-size:13px;">This is for educational purposes only. Consider discussing your allocation with a qualified financial professional.</span>';

  verdict.style.background = '#1a0f00';
  verdict.style.border = '1px solid #c2500f';
  verdict.innerHTML = '<p style="color:#d4c5a0;font-size:14px;line-height:1.75;">' + text + '</p>';
}

function igUpdate() {
  const expenses = igParse('ig-expenses');

  const totalIncome = ss + other;

  // Sync sliders
  ['expenses', 'ss', 'other'].forEach(field => {
    const input = document.getElementById('ig-' + field);

      const raw = parseInt(input.value.replace(/[^0-9]/g, '')) || 0;

    }
  });

  // Update expense label

  if (expLabel) expLabel.textContent = 'Monthly Expenses: ' + igFmt(expenses);

  // Update bar widths
  const ssPct = expenses > 0 ? Math.min((ss / expenses) * 100, 100) : 0;
  const otherPct = expenses > 0 ? Math.min((other / expenses) * 100, 100 - ssPct) : 0;
  const gapPct = expenses > 0 ? Math.max(0, 100 - ssPct - otherPct) : 0;

  const barSS = document.getElementById('ig-bar-ss');
  const barOther = document.getElementById('ig-bar-other');
  const barGap = document.getElementById('ig-bar-gap');

  if (barSS) barSS.style.width = ssPct + '%';
  if (barOther) { barOther.style.left = ssPct + '%'; barOther.style.width = otherPct + '%'; }
  if (barGap) { barGap.style.left = (ssPct + otherPct) + '%'; barGap.style.width = gapPct + '%'; }

  // Update numbers
  const numSS = document.getElementById('ig-num-ss');
  const numOther = document.getElementById('ig-num-other');

let gearActive = null;
let gearAnimating = false;

function gearAnimate() {
  const svg = document.getElementById('gear-svg');
  if (!svg) return;
  svg.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';
  const gearDefs = [
    { id: 'wealth', cx: 170, cy: 105, dir: 1,  color: '#4ade80', bg: '#0a1f0a', label: 'WEALTH' },
    { id: 'tax',    cx: 95,  cy: 210, dir: -1, color: '#f97316', bg: '#1a0f00', label: 'TAX'    },
    { id: 'legal',  cx: 245, cy: 210, dir: -1, color: '#60a5fa', bg: '#0a0f1f', label: 'LEGAL'  },
  ];

  const teeth = 12;
  const innerR = 28;
  const outerR = 42;
  const toothW = 0.18;

  function gearPath(cx, cy) {
    let d = '';
    for (let i = 0; i < teeth; i++) {
      const a1 = (i / teeth) * Math.PI * 2;
      const a2 = a1 + toothW;
      const a3 = a1 + (Math.PI / teeth) - toothW;
      const a4 = a1 + (Math.PI / teeth);
      d += (i === 0 ? 'M' : 'L') +
        (cx + Math.cos(a1) * innerR) + ',' + (cy + Math.sin(a1) * innerR) + ' L' +
        (cx + Math.cos(a2) * outerR) + ',' + (cy + Math.sin(a2) * outerR) + ' L' +
        (cx + Math.cos(a3) * outerR) + ',' + (cy + Math.sin(a3) * outerR) + ' L' +
        (cx + Math.cos(a4) * innerR) + ',' + (cy + Math.sin(a4) * innerR) + ' ';
    }
    return d + 'Z';
  }

  const groups = [];

  gearDefs.forEach(g => {
    // Rotating group
    const grp = document.createElementNS(ns, 'g');
    grp.id = 'gear-' + g.id + '-g';

    // Gear body
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', gearPath(g.cx, g.cy));
    path.setAttribute('fill', g.bg);
    path.setAttribute('stroke', g.color);
    path.setAttribute('stroke-width', '2');
    grp.appendChild(path);

    // Inner circle
    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', g.cx);
    circle.setAttribute('cy', g.cy);
    circle.setAttribute('r', '18');
    circle.setAttribute('fill', g.bg);
    circle.setAttribute('stroke', g.color);
    circle.setAttribute('stroke-width', '1.5');
    grp.appendChild(circle);

    svg.appendChild(grp);

    // Label (outside rotating group so it stays upright)
    const text = document.createElementNS(ns, 'text');
    text.setAttribute('x', g.cx);
    text.setAttribute('y', g.cy + 5);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', g.color);
    text.setAttribute('font-family', 'Bebas Neue, sans-serif');
    text.setAttribute('font-size', '12');
    text.setAttribute('style', 'pointer-events:none;');
    text.textContent = g.label;
    svg.appendChild(text);

    // Clickable overlay circle
    const hit = document.createElementNS(ns, 'circle');
    hit.setAttribute('cx', g.cx);
    hit.setAttribute('cy', g.cy);
    hit.setAttribute('r', '42');
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('style', 'cursor:pointer;');
    hit.addEventListener('click', () => gearClick(g.id));
    svg.appendChild(hit);

    groups.push({ grp, cx: g.cx, cy: g.cy, dir: g.dir });
  });

  // Animate
  let angle = 0;
  let frames = 0;
  const maxFrames = 120;
  function step() {
    if (frames >= maxFrames) return;
    angle += 1.5;
    groups.forEach(g => {
      g.grp.setAttribute('transform',
        'rotate(' + (angle * g.dir) + ',' + g.cx + ',' + g.cy + ')'
      );
    });
    frames++;
    requestAnimationFrame(step);
  }
  step();
}

    if (yearLabel) yearLabel.textContent = d.funds > 0 ? 'Age ' + d.age + ': ' + cpFmt(d.funds) : 'Age ' + d.age + ': $0 - Depleted';
    i++;
    setTimeout(step, 400);
  }
  step();
}


render();

</script>
</body>
</html>
